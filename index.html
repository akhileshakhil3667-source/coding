<!DOCTYPE html>
<html>
<head>
<title>Registration</title>

<style>

body{
background: linear-gradient(to left,cyan, #1D8348);
font-family: Verdana;
}

.container{
width:520px;
margin:50px auto;
border:2px white;
border-radius:12px;
padding:20px;
background:red;
color:white;
background-image:url("https://thumbs.dreamstime.com/b/modern-city-skyline-interchange-overpass-night-shanghai-china-32541989.jpg");
}

h3{
text-align:center;
color:white;

font-size:27px;
}

.row{
display:flex;
margin-bottom:12px;
}

.box{
width:100%;
margin:6px;
display:flex;
flex-direction:column;
}

label{
font-weight:600;
}

input,select,textarea{
padding:5px;
border-radius:5px;
}

button{
margin:auto;
padding:7px 15px;
background:blue;

color:white;
border:none;
border-radius:5px;
}

button:hover{
background:white;
}

</style>
</head>

<body>

<div class="container">

<h3>REGISTRATION FORM</h3>

<form>

<div class="row">
<div class="box">
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>
</div>

<div class="row">

<div class="box">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="box">
<label>Mobile Number</label>
<input type="tel" placeholder="Enter your number">
</div>
</div>

<div class="row">
<div class="box">
<label>Gender</label>
<div>
<input type="radio" name="g">Male
<input type="radio" name="g">Female
</div>
</div>

<div class="box">
<label>Date of Birth</label>
<input type="date">
</div>
</div>

<div class="row">
<div class="box">

<label>Course</label>
<select>
<option>CSE</option>
<option>AI/DS</option>
<option>IT</option>
<option>CIVIL</option>
<option>EEE</option>
</select>
</div>

<div class="box">
<label>Interests</label>
<div>
<input type="checkbox">Sports
<input type="checkbox">Music
<input type="checkbox">Art
</div>
</div>
</div>

<div class="row">
<div class="box">
<label>Address</label>
<textarea rows="3" placeholder="Enter your Address"></textarea>
</div>
</div>

<div class="row">

<button>Register</button>
</div>

</form>
</div>

</body>
</html>
